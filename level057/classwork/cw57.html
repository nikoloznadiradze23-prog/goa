<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="box1">Box 1</div>
    <div id="box2">Box 2</div>
    <script>
        document.getElementById("box1").style.color = "red";
        document.getElementById("box1").style.background = "yellow";
        document.getElementById("box1").style.fontSize = "20px";
        document.getElementById("box2").style.color = "blue";
        document.getElementById("box2").style.background = "pink";
        document.getElementById("box2").style.border = "2px solid black";
    </script>
</body>
</html>
