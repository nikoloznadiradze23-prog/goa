<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Typing Speed Test</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    
  </style>
</head>
<body>

  Personal best: <!-- PB --> WPM

  WPM: <!-- WPM -->
  Accuracy: <!-- Accuracy -->
  Time: <!-- Time -->
  <div id="pretest">
  <select name="Difficulty:" id="Difficulty:">
    <option value="easy">EASY</option>
    <option value="medium">MEDIUM</option>
    <option value="hard">HARD</option>
  </select>
  <select name="Mode" id="Mode">
  <option value="Timed60s">Timed (60s)</option>
  <option value="Passage">Passage</option>
  </select>

  <!-- Passage -->

  <button>Start Typing Test</button></div>
  Or click the text and start typing

  <!-- Test Complete Start -->

  Test Complete!
  Solid run. Keep pushing to beat your high score.

  WPM: <!-- WPM -->
  Accuracy: <!-- Accuracy -->
  Characters: <!-- Correct/Incorrect -->

  <button>Go Again</button>
  
  <!-- Test Complete End -->
  <script src="script.js"></script>

</body>
</html>
